<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Orders - Equipment Maintenance Work Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .navbar { background: linear-gradient(90deg, #1e3c72, #2a5298); }
        .stat-card { border: none; border-radius: 12px; transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .table th { font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
        .btn-xs { font-size: .75rem; }
        .bg-purple  { background-color: #6f42c1 !important; }
        .bg-darkred { background-color: #b02a37 !important; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-2 shadow-sm">
    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-tools fs-4 text-white"></i>
        <span class="fw-bold text-white fs-5">Equipment Maintenance Work Order System</span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="text-white text-decoration-none fw-semibold"><i class="bi bi-list-task me-1"></i>Work Orders</a>
        <a href="/equipment.html" class="text-white-50 text-decoration-none"><i class="bi bi-cpu me-1"></i>Equipment</a>
        <a href="/analytics.html" class="text-white-50 text-decoration-none"><i class="bi bi-bar-chart-line me-1"></i>Analytics</a>
        <div class="vr bg-white opacity-25 mx-1" style="height:20px"></div>
        <span class="text-white-50 small" id="navUser"></span>
        <button class="btn btn-sm btn-outline-light" onclick="API.logout()"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <!-- Stats -->
    <div class="row g-3 mb-4" id="statsRow"></div>

    <!-- Toolbar -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3 d-flex flex-wrap align-items-center gap-2">
            <select class="form-select form-select-sm" style="width:160px" id="filterStatus">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="InProgress">In Progress</option>
                <option value="PendingReview">Pending Review</option>
                <option value="Completed">Completed</option>
                <option value="Rejected">Rejected</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadOrders()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
            <div class="ms-auto">
                <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
                    <i class="bi bi-plus-circle me-1"></i>New Work Order
                </button>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Title</th>
                            <th>Equipment</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Reported By</th>
                            <th>Assigned To</th>
                            <th>Created</th>
                            <th class="text-end pe-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orderTable"></tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center py-5 text-muted d-none">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>No work orders found
            </div>
        </div>
    </div>
</div>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle text-primary me-2"></i>New Work Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Fault Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="c_title" placeholder="Briefly describe the issue">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Equipment <span class="text-danger">*</span></label>
                    <select class="form-select" id="c_equipment"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Priority</label>
                    <select class="form-select" id="c_priority">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Fault Description</label>
                    <textarea class="form-control" id="c_desc" rows="3" placeholder="Describe the fault in detail, including when it occurred"></textarea>
                </div>
                <div id="createError" class="alert alert-danger py-2 small d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="submitCreate()"><i class="bi bi-send me-1"></i>Submit</button>
            </div>
        </div>
    </div>
</div>

<!-- Assign Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-person-check text-info me-2"></i>Assign Technician</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-2">Work Order: <span id="assign_title" class="fw-semibold text-dark"></span></p>
                <label class="form-label fw-semibold">Select Technician</label>
                <select class="form-select" id="assign_tech"></select>
                <div id="assignError" class="alert alert-danger py-2 small mt-2 d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-info btn-sm text-white" onclick="submitAssign()"><i class="bi bi-check2 me-1"></i>Confirm Assignment</button>
            </div>
        </div>
    </div>
</div>

<!-- Reject Modal -->
<div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-x-circle text-danger me-2"></i>Reject Work Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-2">Work Order: <span id="reject_title" class="fw-semibold text-dark"></span></p>
                <label class="form-label fw-semibold">Rejection Reason <span class="text-danger">*</span></label>
                <textarea class="form-control" id="reject_reason" rows="3" placeholder="Explain why this work order is being rejected"></textarea>
                <div id="rejectError" class="alert alert-danger py-2 small mt-2 d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger btn-sm" onclick="submitReject()"><i class="bi bi-x-circle me-1"></i>Confirm Reject</button>
            </div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-file-text text-primary me-2"></i>Work Order Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer border-0 pt-0" id="detailFooter">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
// Extend shared maps with new statuses
statusLabel.Approved      = 'Approved';
statusLabel.PendingReview = 'Pending Review';
statusLabel.Rejected      = 'Rejected';
statusClass.Approved      = 'primary';
statusClass.PendingReview = 'purple';
statusClass.Rejected      = 'darkred';

if (!API.requireAuth()) throw '';

const user = API.getUser();
const isSupervisor = () => user.role === 'Supervisor';

document.getElementById('navUser').innerHTML =
    `<i class="bi bi-person-circle me-1"></i>${user.fullName} <span class="badge ${
        user.role === 'Admin'      ? 'bg-warning text-dark' :
        user.role === 'Supervisor' ? 'bg-purple'            :
                                     'bg-light text-dark'
    } ms-1">${user.role}</span>`;

let technicians = [];
let currentAssignId = null;
let currentRejectId = null;
let currentDetailWorkOrderId = null;
let currentDetailWorkOrderTitle = '';

async function init() {
    await Promise.all([loadStats(), loadOrders()]);
    if (API.isAdmin()) technicians = await API.get('/api/users/technicians') || [];
}

async function loadStats() {
    const all = await API.get('/api/workorder');
    if (!all) return;
    const c = {};
    all.forEach(w => c[w.status] = (c[w.status] || 0) + 1);
    const cards = [
        { label: 'Total',           value: all.length,                                              icon: 'bi-list-task',           color: 'primary' },
        { label: 'Awaiting Action', value: (c.Pending || 0) + (c.Approved || 0),                   icon: 'bi-hourglass-split',     color: 'warning' },
        { label: 'In Progress',     value: (c.InProgress || 0) + (c.PendingReview || 0),           icon: 'bi-gear-wide-connected', color: 'info'    },
        { label: 'Completed',       value: c.Completed || 0,                                        icon: 'bi-check-circle',        color: 'success' },
    ];
    document.getElementById('statsRow').innerHTML = cards.map(c => `
        <div class="col-6 col-md-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center bg-${c.color} bg-opacity-10" style="width:48px;height:48px;flex-shrink:0">
                        <i class="bi ${c.icon} text-${c.color} fs-4"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold lh-1">${c.value}</div>
                        <div class="text-muted small">${c.label}</div>
                    </div>
                </div>
            </div>
        </div>`).join('');
}

async function loadOrders() {
    const status = document.getElementById('filterStatus').value;
    const url = '/api/workorder' + (status ? `?status=${status}` : '');
    const orders = await API.get(url) || [];
    const tbody = document.getElementById('orderTable');
    const empty = document.getElementById('emptyState');
    if (!orders.length) { tbody.innerHTML = ''; empty.classList.remove('d-none'); return; }
    empty.classList.add('d-none');

    tbody.innerHTML = orders.map(w => {
        const a = [];
        a.push(`<button class="btn btn-outline-secondary btn-xs py-0 px-2" onclick="showDetail(${w.id})"><i class="bi bi-eye"></i></button>`);

        // Supervisor actions
        if (isSupervisor() && w.status === 'Pending')
            a.push(`<button class="btn btn-outline-primary btn-xs py-0 px-2" onclick="approveOrder(${w.id})"><i class="bi bi-check-circle me-1"></i>Approve</button>`);
        if (isSupervisor() && (w.status === 'Pending' || w.status === 'Approved'))
            a.push(`<button class="btn btn-outline-danger btn-xs py-0 px-2" onclick="openReject(${w.id},'${escHtml(w.title)}')"><i class="bi bi-x-circle me-1"></i>Reject</button>`);
        if (isSupervisor() && w.status === 'PendingReview')
            a.push(`<button class="btn btn-outline-success btn-xs py-0 px-2" onclick="confirmComplete(${w.id})"><i class="bi bi-patch-check me-1"></i>Confirm Complete</button>`);

        // Admin: assign only when Approved
        if (API.isAdmin() && w.status === 'Approved')
            a.push(`<button class="btn btn-outline-info btn-xs py-0 px-2" onclick="openAssign(${w.id},'${escHtml(w.title)}')"><i class="bi bi-person-check me-1"></i>Assign</button>`);

        // Technician or Admin: submit for review when InProgress
        if (w.status === 'InProgress' && (API.isAdmin() || w.assignedToId === user.id))
            a.push(`<button class="btn btn-outline-primary btn-xs py-0 px-2" onclick="submitReview(${w.id},'${escHtml(w.title)}')"><i class="bi bi-send me-1"></i>Submit Review</button>`);

        // Admin: cancel (not on terminal statuses)
        if (API.isAdmin() && !['Completed', 'Cancelled', 'Rejected'].includes(w.status))
            a.push(`<button class="btn btn-outline-danger btn-xs py-0 px-2" onclick="cancelOrder(${w.id})"><i class="bi bi-x"></i></button>`);

        return `<tr>
            <td class="ps-3 text-muted small">#${w.id}</td>
            <td class="fw-semibold">${escHtml(w.title)}</td>
            <td class="small">${escHtml(w.equipmentName)}</td>
            <td><span class="badge bg-${priorityClass[w.priority]}">${priorityLabel[w.priority]}</span></td>
            <td><span class="badge bg-${statusClass[w.status] || 'secondary'}">${statusLabel[w.status] || w.status}</span></td>
            <td class="small">${escHtml(w.reportedByName)}</td>
            <td class="small">${w.assignedToName ? escHtml(w.assignedToName) : '<span class="text-muted">Unassigned</span>'}</td>
            <td class="small text-muted">${fmtDate(w.createdAt)}</td>
            <td class="text-end pe-3"><div class="d-flex gap-1 justify-content-end flex-wrap">${a.join('')}</div></td>
        </tr>`;
    }).join('');
}

document.getElementById('filterStatus').addEventListener('change', loadOrders);

function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Create ──────────────────────────────────────────────────────────────────

async function openCreateModal() {
    const equip = await API.get('/api/equipment') || [];
    document.getElementById('c_equipment').innerHTML = equip.map(e =>
        `<option value="${e.id}">${escHtml(e.name)} (${escHtml(e.location)})</option>`).join('');
    document.getElementById('c_title').value = '';
    document.getElementById('c_desc').value = '';
    document.getElementById('c_priority').value = 'Medium';
    document.getElementById('createError').classList.add('d-none');
    new bootstrap.Modal('#createModal').show();
}

async function submitCreate() {
    const title       = document.getElementById('c_title').value.trim();
    const equipmentId = parseInt(document.getElementById('c_equipment').value);
    const priority    = document.getElementById('c_priority').value;
    const description = document.getElementById('c_desc').value.trim();
    const errDiv      = document.getElementById('createError');
    if (!title) { errDiv.textContent = 'Please enter a fault title'; errDiv.classList.remove('d-none'); return; }
    const { ok, data } = await API.post('/api/workorder', { title, description, priority, equipmentId });
    if (!ok) { errDiv.textContent = data?.message || 'Submission failed'; errDiv.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance('#createModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

// ── Assign ───────────────────────────────────────────────────────────────────

function openAssign(id, title) {
    currentAssignId = id;
    document.getElementById('assign_title').textContent = title;
    document.getElementById('assign_tech').innerHTML = technicians.map(t =>
        `<option value="${t.id}">${escHtml(t.fullName)} (${escHtml(t.username)})</option>`).join('');
    document.getElementById('assignError').classList.add('d-none');
    new bootstrap.Modal('#assignModal').show();
}

async function submitAssign() {
    const techId = parseInt(document.getElementById('assign_tech').value);
    const errDiv = document.getElementById('assignError');
    const { ok, data } = await API.put(`/api/workorder/${currentAssignId}/assign`, { technicianId: techId });
    if (!ok) { errDiv.textContent = data?.message || 'Assignment failed'; errDiv.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance('#assignModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

// ── Approve / Reject / Submit Review / Confirm Complete ──────────────────────

async function approveOrder(id) {
    if (!confirm('Approve this work order?')) return;
    const { ok, data } = await API.post(`/api/workorder/${id}/approve`);
    if (!ok) { alert(data?.message || 'Approval failed'); return; }
    await Promise.all([loadOrders(), loadStats()]);
}

function openReject(id, title) {
    currentRejectId = id;
    document.getElementById('reject_title').textContent = title;
    document.getElementById('reject_reason').value = '';
    document.getElementById('rejectError').classList.add('d-none');
    new bootstrap.Modal('#rejectModal').show();
}

async function submitReject() {
    const reason = document.getElementById('reject_reason').value.trim();
    const errDiv = document.getElementById('rejectError');
    if (!reason) { errDiv.textContent = 'Please enter a rejection reason'; errDiv.classList.remove('d-none'); return; }
    const { ok, data } = await API.post(`/api/workorder/${currentRejectId}/reject`, { rejectionReason: reason });
    if (!ok) { errDiv.textContent = data?.message || 'Rejection failed'; errDiv.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance('#rejectModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

async function submitReview(id, title) {
    if (!confirm(`Submit "${title}" for supervisor review?`)) return;
    const { ok, data } = await API.post(`/api/workorder/${id}/submit-review`);
    if (!ok) { alert(data?.message || 'Operation failed'); return; }
    await Promise.all([loadOrders(), loadStats()]);
}

async function confirmComplete(id) {
    if (!confirm('Confirm this work order as completed?')) return;
    const { ok, data } = await API.post(`/api/workorder/${id}/confirm-complete`);
    if (!ok) { alert(data?.message || 'Operation failed'); return; }
    await Promise.all([loadOrders(), loadStats()]);
}

async function cancelOrder(id) {
    if (!confirm('Are you sure you want to cancel this work order?')) return;
    const { ok, data } = await API.put(`/api/workorder/${id}/cancel`);
    if (!ok) { alert(data?.message || 'Cancellation failed'); return; }
    await Promise.all([loadOrders(), loadStats()]);
}

// ── Detail Modal ─────────────────────────────────────────────────────────────

async function showDetail(id) {
    const [w, photos, checklist] = await Promise.all([
        API.get(`/api/workorder/${id}`),
        API.get(`/api/photo/${id}`),
        API.get(`/api/checklist/${id}`)
    ]);
    if (!w) return;

    currentDetailWorkOrderId    = w.id;
    currentDetailWorkOrderTitle = w.title;

    const showChecklist  = w.status === 'InProgress' || w.status === 'PendingReview';
    const canSubmitReview = w.status === 'InProgress' && (API.isAdmin() || w.assignedToId === user.id);
    const items      = checklist || [];
    const allChecked = items.length > 0 && items.every(i => i.isChecked);
    const remaining  = items.filter(i => !i.isChecked).length;

    document.getElementById('detailBody').innerHTML = `
        <div class="row g-3">
            <div class="col-12"><h6 class="fw-bold text-dark">${escHtml(w.title)}</h6></div>
            <div class="col-md-6">
                <div class="bg-light rounded p-3">
                    <div class="row g-2 small">
                        <div class="col-5 text-muted">Work Order No.</div><div class="col-7 fw-semibold">#${w.id}</div>
                        <div class="col-5 text-muted">Priority</div><div class="col-7"><span class="badge bg-${priorityClass[w.priority]}">${priorityLabel[w.priority]}</span></div>
                        <div class="col-5 text-muted">Status</div><div class="col-7"><span class="badge bg-${statusClass[w.status] || 'secondary'}">${statusLabel[w.status] || w.status}</span></div>
                        <div class="col-5 text-muted">Equipment</div><div class="col-7">${escHtml(w.equipmentName)}</div>
                        <div class="col-5 text-muted">Reported By</div><div class="col-7">${escHtml(w.reportedByName)}</div>
                        <div class="col-5 text-muted">Assigned To</div><div class="col-7">${w.assignedToName ? escHtml(w.assignedToName) : '<span class="text-muted">Unassigned</span>'}</div>
                        <div class="col-5 text-muted">Created</div><div class="col-7">${fmtDate(w.createdAt)}</div>
                        ${w.completedAt ? `<div class="col-5 text-muted">Completed</div><div class="col-7">${fmtDate(w.completedAt)}</div>` : ''}
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-2">
                    <div class="text-muted small mb-1">Fault Description</div>
                    <div class="bg-light rounded p-3 small">${escHtml(w.description) || '<span class="text-muted">None</span>'}</div>
                </div>
                ${w.completionNotes ? `<div class="mb-2">
                    <div class="text-muted small mb-1">Completion Notes</div>
                    <div class="bg-success bg-opacity-10 rounded p-3 small">${escHtml(w.completionNotes)}</div>
                </div>` : ''}
                ${w.rejectionReason ? `<div>
                    <div class="text-muted small mb-1">Rejection Reason</div>
                    <div class="bg-danger bg-opacity-10 rounded p-3 small text-danger">${escHtml(w.rejectionReason)}</div>
                </div>` : ''}
            </div>
            ${showChecklist ? `
            <div class="col-12">
                <hr class="my-1">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <span class="text-muted small fw-semibold"><i class="bi bi-clipboard-check me-1"></i>Safety Checklist</span>
                    ${allChecked
                        ? '<span class="badge bg-success">All Complete</span>'
                        : `<span class="badge bg-warning text-dark">${remaining} remaining</span>`}
                </div>
                <div id="checklistItems">${renderChecklist(items, w.id, w.status === 'InProgress')}</div>
            </div>` : ''}
            <div class="col-12">
                <hr class="my-1">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <span class="text-muted small fw-semibold"><i class="bi bi-images me-1"></i>Photos</span>
                    <button class="btn btn-outline-secondary btn-xs" onclick="document.getElementById('photoInput').click()">
                        <i class="bi bi-upload me-1"></i>Upload Photo
                    </button>
                </div>
                <input type="file" id="photoInput" accept=".jpg,.jpeg,.png,.gif" class="d-none"
                       onchange="uploadPhoto(${w.id}, this)">
                <div id="photoGallery" class="d-flex flex-wrap gap-2">${renderPhotoThumbs(photos || [])}</div>
                <div id="photoUploadMsg" class="small mt-1"></div>
            </div>
        </div>`;

    document.getElementById('detailFooter').innerHTML = `
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
        ${w.status === 'Completed' ? `
        <button class="btn btn-outline-primary btn-sm" onclick="downloadReport(${w.id})">
            <i class="bi bi-file-earmark-pdf me-1"></i>Download Report
        </button>` : ''}
        ${canSubmitReview ? `
        <button id="modalSubmitReviewBtn" class="btn btn-primary btn-sm"
                onclick="submitReviewFromDetail()"
                ${!allChecked ? 'disabled title="Complete all safety checklist items first"' : ''}>
            <i class="bi bi-send me-1"></i>Submit for Review
        </button>` : ''}
        ${isSupervisor() && w.status === 'Pending' ? `
        <button class="btn btn-primary btn-sm" onclick="approveFromDetail(${w.id})">
            <i class="bi bi-check-circle me-1"></i>Approve
        </button>` : ''}
        ${isSupervisor() && (w.status === 'Pending' || w.status === 'Approved') ? `
        <button class="btn btn-danger btn-sm" onclick="rejectFromDetail(${w.id},'${escHtml(w.title)}')">
            <i class="bi bi-x-circle me-1"></i>Reject
        </button>` : ''}
        ${isSupervisor() && w.status === 'PendingReview' ? `
        <button class="btn btn-success btn-sm" onclick="confirmCompleteFromDetail(${w.id})">
            <i class="bi bi-patch-check me-1"></i>Confirm Complete
        </button>` : ''}`;

    new bootstrap.Modal('#detailModal').show();
}

function renderChecklist(items, workOrderId, editable) {
    if (!items.length) return '<span class="text-muted small">No checklist items.</span>';
    return items.map(item => `
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="chk_${item.id}"
                   ${item.isChecked ? 'checked' : ''}
                   ${editable ? `onchange="toggleChecklistItem(${item.id}, this.checked, ${workOrderId})"` : 'disabled'}>
            <label class="form-check-label small ${item.isChecked ? 'text-decoration-line-through text-muted' : ''}"
                   for="chk_${item.id}">${escHtml(item.itemText)}</label>
        </div>`).join('');
}

async function toggleChecklistItem(itemId, checked, workOrderId) {
    const { ok } = await API.put(`/api/checklist/${itemId}/${checked ? 'check' : 'uncheck'}`);
    if (!ok) { document.getElementById(`chk_${itemId}`).checked = !checked; return; }
    const items = await API.get(`/api/checklist/${workOrderId}`);
    document.getElementById('checklistItems').innerHTML = renderChecklist(items || [], workOrderId, true);
    const btn = document.getElementById('modalSubmitReviewBtn');
    if (btn) {
        const allChecked = items && items.length > 0 && items.every(i => i.isChecked);
        btn.disabled = !allChecked;
        btn.title    = allChecked ? '' : 'Complete all safety checklist items first';
    }
}

// Detail modal action helpers
async function submitReviewFromDetail() {
    const { ok, data } = await API.post(`/api/workorder/${currentDetailWorkOrderId}/submit-review`);
    if (!ok) { alert(data?.message || 'Operation failed'); return; }
    bootstrap.Modal.getInstance('#detailModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

async function approveFromDetail(id) {
    if (!confirm('Approve this work order?')) return;
    const { ok, data } = await API.post(`/api/workorder/${id}/approve`);
    if (!ok) { alert(data?.message || 'Approval failed'); return; }
    bootstrap.Modal.getInstance('#detailModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

function rejectFromDetail(id, title) {
    bootstrap.Modal.getInstance('#detailModal').hide();
    openReject(id, title);
}

async function confirmCompleteFromDetail(id) {
    if (!confirm('Confirm this work order as completed?')) return;
    const { ok, data } = await API.post(`/api/workorder/${id}/confirm-complete`);
    if (!ok) { alert(data?.message || 'Operation failed'); return; }
    bootstrap.Modal.getInstance('#detailModal').hide();
    await Promise.all([loadOrders(), loadStats()]);
}

// ── Report ───────────────────────────────────────────────────────────────────

async function downloadReport(id) {
    const res = await fetch(`/api/report/${id}`, {
        headers: { 'Authorization': `Bearer ${API.getToken()}` }
    });
    if (!res.ok) { alert('Failed to generate report'); return; }
    const blob = await res.blob();
    window.open(URL.createObjectURL(blob), '_blank');
}

// ── Photos ───────────────────────────────────────────────────────────────────

function renderPhotoThumbs(photos) {
    if (!photos.length) return '<span class="text-muted small">No photos yet.</span>';
    return photos.map(p => {
        const canDelete = p.uploadedById === user.id || API.isAdmin();
        return `
        <div style="position:relative;display:inline-block;">
            <a href="/uploads/${p.workOrderId}/${p.fileName}" target="_blank" title="Click to open full size">
                <img src="/uploads/${p.workOrderId}/${p.fileName}" loading="lazy"
                     style="width:88px;height:88px;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb;display:block;">
            </a>
            ${canDelete ? `
            <button onclick="deletePhoto(${p.id}, ${p.workOrderId})" title="Delete photo"
                    style="position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;
                           border:none;background:rgba(0,0,0,.55);color:#fff;font-size:13px;line-height:1;
                           cursor:pointer;display:flex;align-items:center;justify-content:center;
                           padding:0;opacity:.75;transition:opacity .15s;"
                    onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.75'">&times;</button>` : ''}
        </div>`;
    }).join('');
}

async function deletePhoto(photoId, workOrderId) {
    if (!confirm('Delete this photo?')) return;
    const ok = await API.del(`/api/photo/delete/${photoId}`);
    if (!ok) { alert('Delete failed'); return; }
    const photos = await API.get(`/api/photo/${workOrderId}`);
    document.getElementById('photoGallery').innerHTML = renderPhotoThumbs(photos || []);
}

async function uploadPhoto(workOrderId, input) {
    const file = input.files[0];
    if (!file) return;
    const msg = document.getElementById('photoUploadMsg');
    msg.innerHTML = '<span class="text-muted"><i class="bi bi-arrow-repeat me-1"></i>Uploading…</span>';
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch(`/api/photo/${workOrderId}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${API.getToken()}` },
        body: formData
    });
    input.value = '';
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        msg.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-circle me-1"></i>${escHtml(err.message || 'Upload failed')}</span>`;
        return;
    }
    msg.innerHTML = '';
    const photos = await API.get(`/api/photo/${workOrderId}`);
    document.getElementById('photoGallery').innerHTML = renderPhotoThumbs(photos || []);
}

init();
</script>
