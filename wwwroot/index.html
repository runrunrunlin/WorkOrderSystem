<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Maintenance Work Order System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="card shadow-lg border-0" style="width:420px">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-tools text-primary" style="font-size:3rem"></i>
                <h4 class="mt-2 fw-bold">Equipment Maintenance Work Order System</h4>
                <p class="text-muted small mb-0">Manufacturing Equipment Maintenance Management Platform</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                </button>
                <div id="loginError" class="alert alert-danger mt-3 py-2 d-none small"></div>
            </form>
            <hr class="my-4">
            <div class="text-muted small text-center">
                <div class="mb-1"><i class="bi bi-person-badge me-1"></i>Admin: admin / admin123</div>
                <div><i class="bi bi-person-gear me-1"></i>Technician: tech1 or tech2 / tech123</div>
            </div>
        </div>
    </div>
    <script>
        if (localStorage.getItem('token')) location.href = '/dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type=submit]');
            const errDiv = document.getElementById('loginError');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Signing in...';
            errDiv.classList.add('d-none');
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Login failed');
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({ id: data.userId, username: data.username, role: data.role, fullName: data.fullName }));
                location.href = '/dashboard.html';
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Sign In';
            }
        });
    </script>
</body>
</html>
