<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment - Equipment Maintenance Work Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .navbar { background: linear-gradient(90deg, #1e3c72, #2a5298); }
        .table th { font-weight: 600; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-2 shadow-sm">
    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-tools fs-4 text-white"></i>
        <span class="fw-bold text-white fs-5">Equipment Maintenance Work Order System</span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="text-white-50 text-decoration-none"><i class="bi bi-list-task me-1"></i>Work Orders</a>
        <a href="/equipment.html" class="text-white text-decoration-none fw-semibold"><i class="bi bi-cpu me-1"></i>Equipment</a>
        <a href="/analytics.html" class="text-white-50 text-decoration-none"><i class="bi bi-bar-chart-line me-1"></i>Analytics</a>
        <div class="vr bg-white opacity-25 mx-1" style="height:20px"></div>
        <span class="text-white-50 small" id="navUser"></span>
        <button class="btn btn-sm btn-outline-light" onclick="API.logout()"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body py-3 d-flex align-items-center">
            <h5 class="mb-0 fw-bold"><i class="bi bi-cpu text-primary me-2"></i>Equipment Management</h5>
            <div class="ms-auto" id="addBtnWrap"></div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">ID</th>
                            <th>Equipment Name</th>
                            <th>Model</th>
                            <th>Serial Number</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th class="text-end pe-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="equipTable"></tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center py-5 text-muted d-none">
                <i class="bi bi-cpu fs-1 d-block mb-2"></i>No equipment found
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="equipModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold" id="equipModalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="e_id">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Equipment Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="e_name" placeholder="e.g. CNC Lathe A">
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Model <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="e_model" placeholder="e.g. CK6150">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Serial Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="e_serial" placeholder="e.g. SN-001">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Location <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="e_location" placeholder="e.g. Workshop 1">
                </div>
                <div class="mb-3" id="e_status_wrap" style="display:none">
                    <label class="form-label fw-semibold">Status</label>
                    <select class="form-select" id="e_status">
                        <option value="Normal">Normal</option>
                        <option value="UnderRepair">Under Repair</option>
                        <option value="Scrapped">Scrapped</option>
                    </select>
                </div>
                <div id="equipError" class="alert alert-danger py-2 small d-none"></div>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="submitEquip()"><i class="bi bi-check2 me-1"></i>Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
if (!API.requireAuth()) throw '';

const user = API.getUser();
document.getElementById('navUser').innerHTML =
    `<i class="bi bi-person-circle me-1"></i>${user.fullName} <span class="badge ${user.role==='Admin'?'bg-warning text-dark':'bg-light text-dark'} ms-1">${user.role==='Admin'?'Admin':'Technician'}</span>`;

if (API.isAdmin()) {
    document.getElementById('addBtnWrap').innerHTML =
        `<button class="btn btn-primary btn-sm" onclick="openCreate()"><i class="bi bi-plus-circle me-1"></i>Add Equipment</button>`;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function load() {
    const list = await API.get('/api/equipment') || [];
    const tbody = document.getElementById('equipTable');
    const empty = document.getElementById('emptyState');
    if (!list.length) { tbody.innerHTML = ''; empty.classList.remove('d-none'); return; }
    empty.classList.add('d-none');
    tbody.innerHTML = list.map(e => {
        const actions = [];
        if (API.isAdmin()) {
            actions.push(`<button class="btn btn-outline-secondary btn-xs py-0 px-2" onclick="openEdit(${e.id},'${escHtml(e.name)}','${escHtml(e.model)}','${escHtml(e.serialNumber)}','${escHtml(e.location)}','${e.status}')"><i class="bi bi-pencil"></i></button>`);
            if (e.status !== 'UnderRepair')
                actions.push(`<button class="btn btn-outline-danger btn-xs py-0 px-2" onclick="deleteEquip(${e.id})"><i class="bi bi-trash"></i></button>`);
        }
        return `<tr>
            <td class="ps-3 text-muted small">${e.id}</td>
            <td class="fw-semibold">${escHtml(e.name)}</td>
            <td class="small">${escHtml(e.model)}</td>
            <td class="small text-muted">${escHtml(e.serialNumber)}</td>
            <td class="small">${escHtml(e.location)}</td>
            <td><span class="badge bg-${equipStatusClass[e.status]}">${equipStatusLabel[e.status]}</span></td>
            <td class="text-end pe-3"><div class="d-flex gap-1 justify-content-end">${actions.join('')}</div></td>
        </tr>`;
    }).join('');
}

function clearForm() {
    ['e_id','e_name','e_model','e_serial','e_location'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('e_status').value = 'Normal';
    document.getElementById('equipError').classList.add('d-none');
}

function openCreate() {
    clearForm();
    document.getElementById('equipModalTitle').innerHTML = '<i class="bi bi-plus-circle text-primary me-2"></i>Add Equipment';
    document.getElementById('e_status_wrap').style.display = 'none';
    new bootstrap.Modal('#equipModal').show();
}

function openEdit(id, name, model, serial, location, status) {
    clearForm();
    document.getElementById('equipModalTitle').innerHTML = '<i class="bi bi-pencil text-warning me-2"></i>Edit Equipment';
    document.getElementById('e_id').value = id;
    document.getElementById('e_name').value = name;
    document.getElementById('e_model').value = model;
    document.getElementById('e_serial').value = serial;
    document.getElementById('e_location').value = location;
    document.getElementById('e_status').value = status;
    document.getElementById('e_status_wrap').style.display = '';
    new bootstrap.Modal('#equipModal').show();
}

async function submitEquip() {
    const id = document.getElementById('e_id').value;
    const name = document.getElementById('e_name').value.trim();
    const model = document.getElementById('e_model').value.trim();
    const serialNumber = document.getElementById('e_serial').value.trim();
    const location = document.getElementById('e_location').value.trim();
    const status = document.getElementById('e_status').value;
    const errDiv = document.getElementById('equipError');
    if (!name || !model || !serialNumber || !location) {
        errDiv.textContent = 'Please fill in all required fields'; errDiv.classList.remove('d-none'); return;
    }
    const body = id
        ? { name, model, serialNumber, location, status }
        : { name, model, serialNumber, location };
    const { ok, data } = id
        ? await API.put(`/api/equipment/${id}`, body)
        : await API.post('/api/equipment', body);
    if (!ok) { errDiv.textContent = data?.message || 'Operation failed'; errDiv.classList.remove('d-none'); return; }
    bootstrap.Modal.getInstance('#equipModal').hide();
    load();
}

async function deleteEquip(id) {
    if (!confirm('Are you sure you want to delete this equipment?')) return;
    const ok = await API.del(`/api/equipment/${id}`);
    if (!ok) { alert('Delete failed. This equipment may have associated work orders.'); return; }
    load();
}

const style = document.createElement('style');
style.textContent = '.btn-xs { font-size:.75rem; }';
document.head.appendChild(style);

load();
</script>
</body>
</html>
