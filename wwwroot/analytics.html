<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Equipment Maintenance Work Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f4f6f9;
        }
        .navbar { background: linear-gradient(90deg, #1e3c72, #2a5298); }

        /* Main content column — grows to fill remaining viewport */
        .page-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            min-height: 0;
        }

        /* Cards */
        .stat-card, .chart-card {
            border: none;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
        }
        .stat-card { transition: transform .15s; }
        .stat-card:hover { transform: translateY(-2px); }

        /* Section labels */
        .section-label {
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.1px;
            color: #a0aec0;
            margin-bottom: .9rem;
            flex-shrink: 0;
        }

        /* Table header */
        .table th {
            font-weight: 600;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #6b7280;
        }

        /* Middle charts row: equal-height cards that fill their column */
        .charts-row {
            display: flex;
            gap: 1.5rem;
            flex-shrink: 0;
            margin-bottom: 1.5rem;
        }
        .charts-row > .chart-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .charts-row .chart-card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .charts-row .chart-card .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.25rem 1.5rem 1.5rem;
        }
        /* Canvas wrapper inside a chart card — fills remaining space */
        .canvas-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
        }

        /* Bottom row: stretches to fill remaining page height */
        .bottom-row {
            flex: 1;
            display: flex;
            gap: 1.5rem;
            min-height: 0;
            align-items: stretch;
        }
        .bottom-row > .bottom-col {
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .bottom-row > .bottom-col > .chart-card {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .bottom-row > .bottom-col > .chart-card > .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.25rem 1.5rem 1.5rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-2 shadow-sm" style="flex-shrink:0">
    <div class="d-flex align-items-center gap-3">
        <i class="bi bi-tools fs-4 text-white"></i>
        <span class="fw-bold text-white fs-5">Equipment Maintenance Work Order System</span>
    </div>
    <div class="d-flex align-items-center gap-3">
        <a href="/dashboard.html" class="text-white-50 text-decoration-none"><i class="bi bi-list-task me-1"></i>Work Orders</a>
        <a href="/equipment.html" class="text-white-50 text-decoration-none"><i class="bi bi-cpu me-1"></i>Equipment</a>
        <a href="/analytics.html" class="text-white  text-decoration-none fw-semibold"><i class="bi bi-bar-chart-line me-1"></i>Analytics</a>
        <div class="vr bg-white opacity-25 mx-1" style="height:20px"></div>
        <span class="text-white-50 small" id="navUser"></span>
        <button class="btn btn-sm btn-outline-light" onclick="API.logout()"><i class="bi bi-box-arrow-right me-1"></i>Sign Out</button>
    </div>
</nav>

<div class="page-body">

    <!-- ── Stat Cards ────────────────────────────────────────────────────── -->
    <div class="row g-4 mb-4" id="statsRow" style="flex-shrink:0"></div>

    <!-- ── Middle Charts (equal height) ─────────────────────────────────── -->
    <div class="charts-row">

        <!-- Doughnut: Status Distribution -->
        <div class="chart-col">
            <div class="chart-card">
                <div class="card-body">
                    <div class="section-label"><i class="bi bi-pie-chart me-1"></i>Status Distribution</div>
                    <div class="canvas-wrap" style="display:flex; gap:12px;">
                        <div style="position:relative; flex:7; align-self:stretch; min-height:0;">
                            <canvas id="statusChart"></canvas>
                        </div>
                        <div id="statusLegend" style="flex:3; display:flex; flex-direction:column; justify-content:center; gap:14px; padding-left:4px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bar: Priority Breakdown -->
        <div class="chart-col">
            <div class="chart-card">
                <div class="card-body">
                    <div class="section-label"><i class="bi bi-bar-chart me-1"></i>Priority Breakdown</div>
                    <div class="canvas-wrap">
                        <canvas id="priorityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Line: Past 7 Days -->
        <div class="chart-col">
            <div class="chart-card">
                <div class="card-body">
                    <div class="section-label"><i class="bi bi-graph-up me-1"></i>Work Orders — Past 7 Days</div>
                    <div class="canvas-wrap">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- ── Bottom Row (stretches to fill remaining height) ───────────────── -->
    <div class="bottom-row">

        <!-- Table: Top 5 Recently Completed -->
        <div class="bottom-col" style="flex:7">
            <div class="chart-card">
                <div class="card-body">
                    <div class="section-label"><i class="bi bi-check-circle me-1"></i>5 Most Recently Completed</div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-2">Title</th>
                                    <th>Equipment</th>
                                    <th>Priority</th>
                                    <th>Technician</th>
                                    <th>Completed</th>
                                </tr>
                            </thead>
                            <tbody id="recentTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Horizontal Bar: Equipment Fault Frequency -->
        <div class="bottom-col" style="flex:5">
            <div class="chart-card">
                <div class="card-body">
                    <div class="section-label"><i class="bi bi-cpu me-1"></i>Fault Frequency by Equipment</div>
                    <div class="canvas-wrap">
                        <canvas id="equipChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div><!-- end .page-body -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script src="/js/api.js"></script>
<script>
if (!API.requireAuth()) throw '';

const user = API.getUser();
document.getElementById('navUser').innerHTML =
    `<i class="bi bi-person-circle me-1"></i>${user.fullName} ` +
    `<span class="badge ${user.role === 'Admin' ? 'bg-warning text-dark' : 'bg-light text-dark'} ms-1">` +
    `${user.role === 'Admin' ? 'Admin' : 'Technician'}</span>`;

// ── Colour palette ────────────────────────────────────────────────────────────
const STATUS_COLOR = {
    Pending:    '#f5c518',
    InProgress: '#6b9fd4',
    Completed:  '#7ec8a4',
    Cancelled:  '#b0b8c1'
};
const PRIORITY_COLORS = ['#7ec8a4', '#f0b86e', '#e8957a'];          // Low, Medium, High
const EQUIP_COLORS    = ['#6b9fd4', '#a8c5a0', '#e8957a', '#c4a0c8']; // per-equipment
const LINE_COLOR      = '#6b9fd4';
const LABEL_COLOR     = '#9aafbe';

Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
Chart.defaults.font.size   = 12;

// ── Entry point ───────────────────────────────────────────────────────────────
async function init() {
    const orders = await API.get('/api/workorder');
    if (!orders) return;
    renderStatCards(orders);
    renderStatusChart(orders);
    renderPriorityChart(orders);
    renderTrendChart(orders);
    renderRecentTable(orders);
    renderEquipChart(orders);
}

// ── Stat Cards ────────────────────────────────────────────────────────────────
function renderStatCards(orders) {
    const c = { Pending: 0, InProgress: 0, Completed: 0, Cancelled: 0 };
    orders.forEach(w => { if (c[w.status] !== undefined) c[w.status]++; });
    const cards = [
        { label: 'Total Work Orders', value: orders.length, icon: 'bi-list-task',           color: 'primary' },
        { label: 'Pending',           value: c.Pending,     icon: 'bi-hourglass-split',     color: 'warning' },
        { label: 'In Progress',       value: c.InProgress,  icon: 'bi-gear-wide-connected', color: 'info'    },
        { label: 'Completed',         value: c.Completed,   icon: 'bi-check-circle',        color: 'success' },
    ];
    document.getElementById('statsRow').innerHTML = cards.map(card => `
        <div class="col-6 col-md-3">
            <div class="card stat-card h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle d-flex align-items-center justify-content-center
                                bg-${card.color} bg-opacity-10"
                         style="width:48px;height:48px;flex-shrink:0">
                        <i class="bi ${card.icon} text-${card.color} fs-4"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold lh-1">${card.value}</div>
                        <div class="text-muted small">${card.label}</div>
                    </div>
                </div>
            </div>
        </div>`).join('');
}

// ── Doughnut: Status Distribution — custom HTML legend (30%), canvas (70%) ────
function renderStatusChart(orders) {
    const keys   = ['Pending', 'InProgress', 'Completed', 'Cancelled'];
    const labels = ['Pending', 'In Progress', 'Completed', 'Cancelled'];
    const counts = Object.fromEntries(keys.map(k => [k, 0]));
    orders.forEach(w => { if (counts[w.status] !== undefined) counts[w.status]++; });

    // Render legend as HTML so the canvas always gets exactly 70% of the width
    document.getElementById('statusLegend').innerHTML = keys.map((k, i) => `
        <div style="display:flex; align-items:center; gap:9px;">
            <span style="display:inline-block; width:13px; height:13px; border-radius:3px;
                         background:${STATUS_COLOR[k]}; flex-shrink:0;"></span>
            <span style="font-size:12.5px; color:#374151; white-space:nowrap;">${labels[i]}</span>
            <span style="margin-left:auto; font-size:13px; font-weight:700; color:#1f2937; padding-left:6px;">${counts[k]}</span>
        </div>`).join('');

    new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data: keys.map(k => counts[k]),
                backgroundColor: keys.map(k => STATUS_COLOR[k]),
                borderColor: '#fff',
                borderWidth: 3,
                hoverOffset: 10
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            layout: { padding: 8 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const pct = orders.length
                                ? Math.round(ctx.parsed / orders.length * 100) : 0;
                            return `  ${ctx.label}: ${ctx.parsed} (${pct}%)`;
                        }
                    }
                }
            }
        }
    });
}

// ── Bar: Priority Breakdown ───────────────────────────────────────────────────
function renderPriorityChart(orders) {
    const keys   = ['Low', 'Medium', 'High'];
    const counts = Object.fromEntries(keys.map(k => [k, 0]));
    orders.forEach(w => { if (counts[w.priority] !== undefined) counts[w.priority]++; });

    new Chart(document.getElementById('priorityChart'), {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: keys,
            datasets: [{
                label: 'Work Orders',
                data: keys.map(k => counts[k]),
                backgroundColor: PRIORITY_COLORS,
                borderRadius: 8,
                borderSkipped: false,
                barPercentage: 0.58,
                categoryPercentage: 0.72
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 28 } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end', align: 'end', offset: 2,
                    color: LABEL_COLOR,
                    font: { weight: '700', size: 14 },
                    formatter: val => val
                }
            },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#6b7280' } },
                y: {
                    grid: { color: '#f0f0f0', lineWidth: 1 },
                    ticks: { precision: 0, color: '#9ca3af' },
                    beginAtZero: true
                }
            }
        }
    });
}

// ── Line: Past 7 Days ─────────────────────────────────────────────────────────
function renderTrendChart(orders) {
    const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - (6 - i));
        return {
            key:   d.toISOString().slice(0, 10),
            label: d.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }),
            count: 0
        };
    });
    orders.forEach(w => {
        const key  = new Date(w.createdAt).toISOString().slice(0, 10);
        const slot = days.find(d => d.key === key);
        if (slot) slot.count++;
    });

    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: days.map(d => d.label),
            datasets: [{
                label: 'Created',
                data: days.map(d => d.count),
                borderColor: LINE_COLOR,
                backgroundColor: 'rgba(107,159,212,0.10)',
                borderWidth: 2.5,
                pointBackgroundColor: LINE_COLOR,
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 5,
                tension: 0.35,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#6b7280' } },
                y: {
                    grid: { color: '#f0f0f0', lineWidth: 1 },
                    ticks: { precision: 0, stepSize: 1, color: '#9ca3af' },
                    beginAtZero: true
                }
            }
        }
    });
}

// ── Table: 5 Most Recently Completed ─────────────────────────────────────────
function renderRecentTable(orders) {
    const rows = orders
        .filter(w => w.status === 'Completed')
        .sort((a, b) => new Date(b.completedAt || b.updatedAt) - new Date(a.completedAt || a.updatedAt))
        .slice(0, 5);

    const tbody = document.getElementById('recentTable');
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4 small">
                               No completed work orders yet</td></tr>`;
        return;
    }
    tbody.innerHTML = rows.map(w => `
        <tr>
            <td class="ps-2 fw-semibold small">${escHtml(w.title)}</td>
            <td class="small text-muted">${escHtml(w.equipmentName)}</td>
            <td><span class="badge bg-${priorityClass[w.priority]}">${w.priority}</span></td>
            <td class="small">${w.assignedToName ? escHtml(w.assignedToName) : '<span class="text-muted">—</span>'}</td>
            <td class="small text-muted text-nowrap">${fmtDate(w.completedAt)}</td>
        </tr>`).join('');
}

// ── Horizontal Bar: Equipment Fault Frequency ─────────────────────────────────
function renderEquipChart(orders) {
    const freq = {};
    orders.forEach(w => { freq[w.equipmentName] = (freq[w.equipmentName] || 0) + 1; });
    const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);

    new Chart(document.getElementById('equipChart'), {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: sorted.map(e => e[0]),
            datasets: [{
                label: 'Work Orders',
                data: sorted.map(e => e[1]),
                backgroundColor: sorted.map((_, i) => EQUIP_COLORS[i % EQUIP_COLORS.length]),
                borderRadius: 6,
                borderSkipped: false,
                barPercentage: 0.5,
                categoryPercentage: 0.7
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 36 } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end', align: 'end', offset: 4,
                    color: LABEL_COLOR,
                    font: { weight: '700', size: 12 },
                    formatter: val => val
                }
            },
            scales: {
                x: {
                    grid: { color: '#f0f0f0', lineWidth: 1 },
                    ticks: { precision: 0, color: '#9ca3af' },
                    beginAtZero: true
                },
                y: { grid: { display: false }, ticks: { color: '#4b5563' } }
            }
        }
    });
}

// ── Utility ───────────────────────────────────────────────────────────────────
function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
